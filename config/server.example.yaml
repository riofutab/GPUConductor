# GPUConductor 服务器配置示例

# 服务器配置
server:
  port: "8080"                    # 服务器端口
  database: "host=localhost user=gcond password=gcond dbname=gcond port=5432 sslmode=disable"  # PostgreSQL 连接字符串
  redis: "localhost:6379"         # Redis 连接地址

# LDAP 认证配置
ldap:
  host: "localhost"               # LDAP 服务器地址
  port: 389                       # LDAP 服务器端口
  base_dn: "dc=gpuconductor,dc=local"  # LDAP Base DN
  user_dn: "uid=%s,ou=users,dc=gpuconductor,dc=local"  # 用户DN模板，%s会被用户名替换
  bind_dn: "cn=admin,dc=gpuconductor,dc=local"  # 管理员绑定DN
  bind_pass: "admin_password"     # 管理员绑定密码

# JWT 令牌配置
jwt:
  secret: "your-secret-key-change-in-production"  # JWT 密钥，生产环境请更改
  expiration_hours: 24            # 访问令牌过期时间（小时）
  refresh_expiration_days: 7      # 刷新令牌过期时间（天）

# 数据库配置（详细）
database:
  type: "postgres"                # 数据库类型
  host: "localhost"               # 数据库主机
  port: 5432                      # 数据库端口
  name: "gcond"                   # 数据库名称
  username: "gcond"               # 数据库用户名
  password: "gcond"               # 数据库密码
  sslmode: "disable"              # SSL 模式
  max_open_conns: 25              # 最大打开连接数
  max_idle_conns: 25              # 最大空闲连接数
  conn_max_lifetime: 300          # 连接最大生存时间（秒）

# Redis 配置（详细）
redis:
  host: "localhost"               # Redis 主机
  port: 6379                      # Redis 端口
  password: ""                    # Redis 密码
  db: 0                          # Redis 数据库编号
  pool_size: 10                   # 连接池大小

# 日志配置
log:
  level: "info"                   # 日志级别: debug, info, warn, error
  file: "gcond.log"              # 日志文件路径
  max_size: 100                   # 日志文件最大大小 (MB)
  max_backups: 5                  # 保留的日志文件数量
  max_age: 30                     # 日志文件保留天数
  format: "json"                  # 日志格式: json, text

# 调度器配置
scheduler:
  interval: 5                     # 调度间隔 (秒)
  max_concurrent_tasks: 100       # 最大并发任务数
  default_timeout: 3600           # 默认任务超时时间 (秒)
  retry_attempts: 3               # 任务重试次数
  cleanup_interval: 300           # 清理间隔 (秒)
  max_queue_size: 1000           # 最大队列大小

# GPU 监控配置
gpu:
  monitor_interval: 10            # GPU 监控间隔 (秒)
  nvidia_smi_path: "nvidia-smi"   # nvidia-smi 命令路径
  memory_threshold: 90            # 内存使用率阈值 (%)
  utilization_threshold: 95       # GPU 使用率阈值 (%)

# Docker 配置
docker:
  endpoint: "unix:///var/run/docker.sock"  # Docker 端点
  api_version: "1.41"             # Docker API 版本
  timeout: 60                     # 操作超时时间 (秒)
  pull_timeout: 300               # 镜像拉取超时时间 (秒)
  default_network: "bridge"       # 默认网络
  cleanup_containers: true        # 是否自动清理容器
  cleanup_images: false           # 是否自动清理镜像

# 安全配置
security:
  enable_cors: true               # 是否启用 CORS
  cors_origins: ["*"]             # 允许的 CORS 源
  rate_limit: 100                 # 速率限制 (请求/分钟)
  max_request_size: "10MB"        # 最大请求大小
  enable_https: false             # 是否启用 HTTPS
  cert_file: ""                   # SSL 证书文件
  key_file: ""                    # SSL 私钥文件

# 监控配置
monitoring:
  enable_metrics: true            # 是否启用指标收集
  metrics_port: "9090"           # 指标端口
  health_check_interval: 30       # 健康检查间隔 (秒)
  enable_pprof: false             # 是否启用性能分析
  pprof_port: "6060"             # 性能分析端口

# 通知配置
notifications:
  enable_webhook: false           # 是否启用 Webhook 通知
  webhook_url: ""                # Webhook URL
  webhook_timeout: 10             # Webhook 超时时间 (秒)
  enable_email: false             # 是否启用邮件通知
  smtp_host: ""                  # SMTP 服务器
  smtp_port: 587                 # SMTP 端口
  smtp_username: ""              # SMTP 用户名
  smtp_password: ""              # SMTP 密码
  email_from: ""                 # 发件人邮箱
  email_templates_dir: "templates/email"  # 邮件模板目录

# Agent 配置
agent:
  heartbeat_interval: 30          # 心跳间隔 (秒)
  registration_timeout: 60        # 注册超时时间 (秒)
  max_tasks_per_node: 10         # 每个节点最大任务数
  resource_update_interval: 10    # 资源更新间隔 (秒)

# Web 界面配置
web:
  static_dir: "web/dist"          # 静态文件目录
  template_dir: "web/templates"   # 模板目录
  enable_gzip: true               # 是否启用 Gzip 压缩
  cache_static_files: true        # 是否缓存静态文件