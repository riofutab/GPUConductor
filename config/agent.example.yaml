# GPUConductor Agent 配置示例

# Agent 配置
agent:
  server: "http://localhost:8080"  # 服务器地址
  name: ""                        # 节点名称 (留空使用主机名)
  tags: ["gpu", "training"]       # 节点标签
  priority: 1                     # 节点优先级 (1-10)

# 监控配置
monitor:
  gpu_interval: 10                # GPU 监控间隔 (秒)
  heartbeat_interval: 30          # 心跳间隔 (秒)
  system_interval: 60             # 系统监控间隔 (秒)
  enable_temperature: true        # 是否监控温度
  enable_power: true              # 是否监控功耗

# Docker 配置
docker:
  endpoint: "unix:///var/run/docker.sock"  # Docker 端点
  registry_auth: {}               # Docker 镜像仓库认证
  default_runtime: "nvidia"       # 默认运行时
  network_mode: "bridge"          # 网络模式
  
# 资源限制
resources:
  max_concurrent_tasks: 5         # 最大并发任务数
  cpu_limit: 0                    # CPU 限制 (0 = 不限制)
  memory_limit: 0                 # 内存限制 (MB, 0 = 不限制)
  disk_limit: 0                   # 磁盘限制 (GB, 0 = 不限制)

# 安全配置
security:
  enable_container_isolation: true # 启用容器隔离
  allowed_images: []              # 允许的镜像列表 (空 = 允许所有)
  blocked_images: []              # 禁止的镜像列表
  max_task_duration: 86400        # 最大任务执行时间 (秒)

# 日志配置
log:
  level: "info"                   # 日志级别
  file: "agent.log"              # 日志文件
  max_size: 50                    # 日志文件最大大小 (MB)
  max_backups: 3                  # 保留的日志文件数量