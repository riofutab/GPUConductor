name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v1.0.0 这样的标签时触发
  workflow_dispatch:  # 允许手动触发
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: false
        default: 'dev'

env:
  GO_VERSION: '1.21'

jobs:
  build:
    name: Build for Linux platforms
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
            name: Linux x64
          - goos: linux
            goarch: arm64
            ext: ''
            name: Linux ARM64
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史用于版本信息
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
    
    - name: Get dependencies
      run: go mod download
    
    - name: Get version info
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION="dev-$(git rev-parse --short HEAD)"
        fi
        COMMIT=$(git rev-parse --short HEAD)
        BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "commit=$COMMIT" >> $GITHUB_OUTPUT
        echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
        
        echo "Version: $VERSION"
        echo "Commit: $COMMIT"
        echo "Build Time: $BUILD_TIME"
    
    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        FILENAME="gcond-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
        LDFLAGS="-s -w -X 'GPUConductor/internal/cmd.version=${{ steps.version.outputs.version }}' -X 'GPUConductor/internal/cmd.commit=${{ steps.version.outputs.commit }}' -X 'GPUConductor/internal/cmd.buildTime=${{ steps.version.outputs.build_time }}'"
        
        echo "Building ${{ matrix.name }}..."
        go build -ldflags="$LDFLAGS" -o "$FILENAME" cmd/gcond/main.go
        
        # 验证构建结果
        if [ -f "$FILENAME" ]; then
          SIZE=$(stat -c%s "$FILENAME")
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "✓ Built $FILENAME (${SIZE_MB} MB)"
          
          # 添加执行权限
          chmod +x "$FILENAME"
          
          # 验证版本信息
          ./"$FILENAME" version || echo "Version command not available"
        else
          echo "✗ Build failed for ${{ matrix.name }}"
          exit 1
        fi
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: gcond-${{ matrix.goos }}-${{ matrix.goarch }}
        path: gcond-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
        retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts/
    
    - name: Prepare release files
      run: |
        mkdir -p release/
        find artifacts/ -type f -name "gcond-*" -exec cp {} release/ \;
        
        echo "Release files:"
        ls -la release/
        
        # 创建校验和文件
        cd release/
        sha256sum gcond-* > checksums.txt
        cd ..
    
    - name: Get version info
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
          TAG_NAME="$VERSION"
        else
          VERSION=${GITHUB_REF#refs/tags/}
          TAG_NAME="$VERSION"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
    
    - name: Generate release notes
      id: release_notes
      run: |
        cat > release_notes.md << 'EOF'
        ## GPUConductor ${{ steps.version.outputs.version }}
        
        ### 🚀 功能特性
        - 分布式 GPU 任务调度系统
        - LDAP 用户认证 + JWT 令牌管理
        - PostgreSQL 数据库支持
        - Vue.js 3 现代化前端界面
        - 实时 WebSocket 通信
        - Docker 容器化任务执行
        
        ### 📦 下载说明
        
        选择适合你系统的版本：
        
        | 平台 | 架构 | 文件名 |
        |------|------|--------|
        | Linux | x64 | `gcond-linux-amd64` |
        | Linux | ARM64 | `gcond-linux-arm64` |
        
        ### 🔧 使用方法
        
        ```bash
        # 下载后添加执行权限
        chmod +x gcond-linux-amd64
        
        # 查看帮助
        ./gcond-linux-amd64 --help
        
        # 查看版本信息
        ./gcond-linux-amd64 version
        
        # 启动服务器
        ./gcond-linux-amd64 server --config config.yaml
        
        # 启动 Agent
        ./gcond-linux-amd64 agent --server http://server-ip:8080 --node-id gpu-node-1
        ```
        
        ### 📋 校验和
        下载后请验证文件完整性：
        ```bash
        sha256sum -c checksums.txt
        ```
        
        ### 🐳 Docker 部署
        ```bash
        # 使用 Docker Compose 启动完整环境
        docker-compose up -d
        ```
        
        ---
        
        **完整文档**: [README.md](https://github.com/${{ github.repository }}/blob/main/README.md)
        **构建指南**: [BUILD.md](https://github.com/${{ github.repository }}/blob/main/BUILD.md)
        EOF
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.tag_name }}
        name: GPUConductor ${{ steps.version.outputs.version }}
        body_path: release_notes.md
        files: |
          release/*
        draft: false
        prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}